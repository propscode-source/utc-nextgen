services:
  postgres:
    image: postgres:16-alpine
    container_name: utc_nextgen_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: utc
      POSTGRES_PASSWORD: utc_dev_password
      POSTGRES_DB: utc_nextgen
    volumes:
      - utc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utc -d utc_nextgen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  utc_pgdata:
